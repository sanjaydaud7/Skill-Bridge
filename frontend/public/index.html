<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="SkillBridge Internships - Bridge the gap between learning and professional success" />

    <title>SkillBridge Internships</title>

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* Critical CSS for initial load */
        
        html {
            overflow-x: hidden;
            max-width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }
        
        html::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Opera */
            width: 0;
            height: 0;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }
        
        body::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Opera */
            width: 0;
            height: 0;
        }
        
        #root {
            overflow-x: hidden;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }
        
        #root::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Opera */
            width: 0;
            height: 0;
        }
        /* Prevent all elements from causing horizontal overflow */
        
        * {
            max-width: 100%;
        }
        /* Loading screen */
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading screen -->
    <div id="loading">
        <div class="loader"></div>
    </div>

    <div id="root"></div>

    <script>
        // Hide loading screen once React loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(function() {
                        loading.style.display = 'none';
                    }, 300);
                }
            }, 500);
        });
    </script>
</body>

</html>
